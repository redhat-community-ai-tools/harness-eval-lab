# art-release caller workflow
#
# Usage (on any merged PR):
#   /art-release          - Propose changelog entries and version bump
#   /art-release-confirm  - Execute the release after reviewing the proposal
#   /art-release-cancel   - Cancel a pending release proposal

name: ART Release

on:
  issue_comment:
    types: [created]

jobs:
  release:
    if: >-
      github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && github.event.comment.user.type != 'Bot'
        && (
          github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'COLLABORATOR'
        )
    uses: Benkapner/AI-repo-tools/.github/workflows/reusable-release.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      comment_body: ${{ github.event.comment.body }}
      comment_user: ${{ github.event.comment.user.login }}
      pr_number: ${{ github.event.issue.number }}
      repo: ${{ github.repository }}
      labels_json: ${{ toJSON(github.event.issue.labels.*.name) }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      APP_ID: ${{ secrets.ART_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ART_APP_PRIVATE_KEY }}
